services:
  hermes-monitor:
    image: {{DOCKERHUB_REPO}}:{{IMAGE_TAG}}
    container_name: hermes-monitor
    restart: unless-stopped
    ports:
      - "8480:8000"
    volumes:
      - "/var/apps/hermes-monitor/shares/hermes-monitor/data:/app/data"
    environment:
      - DB_PATH=/app/data/monitor.db
      - PORT=8000
      # UPSTREAMS_JSON enables multi-provider/model routing and can also be
      # configured through the web UI at /settings. Legacy single-upstream
      # UPSTREAM_BASE_URL / UPSTREAM_API_KEY / ACCESS_TOKEN remain supported.
